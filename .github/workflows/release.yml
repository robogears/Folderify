name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      # Actions pinned to full commit SHAs — a mutable tag (@v4) can be re-pointed after
      # a maintainer-account compromise. Trailing comment tracks the human version.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Package macOS (.dmg, ad-hoc signed)
        run: npx --no-install electron-builder --mac --publish never
        env:
          # No Developer ID — electron-builder skips signing (mac.identity: null);
          # build/after-pack.js ad-hoc signs so Gatekeeper doesn't flag "damaged".
          CSC_IDENTITY_AUTODISCOVERY: 'false'

      # SHA-256 sidecar per dmg — the updater fetches it and verifies the download
      # before staging (format "<hex>  <filename>", which fetchExpectedSha parses).
      - name: Generate checksums
        run: |
          cd release
          for f in *.dmg; do
            [ -f "$f" ] && shasum -a 256 "$f" > "$f.sha256"
          done

      # Always upload the built .dmgs as downloadable CI artifacts. This makes a
      # manual "Run workflow" produce test builds without cutting a release.
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Folderify-macos-dmg
          path: |
            release/*.dmg
          if-no-files-found: error

      # Only draft a GitHub Release on a version tag — not on manual/branch runs.
      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release/*.dmg
            release/*.dmg.sha256
